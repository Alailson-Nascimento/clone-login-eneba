<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Eneba</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <a href="https://www.eneba.com/br/">
            <img src="img/eneba-logo.png" alt="Logo da Eneba" class="logo">
        </a>
    </header>

    <main>

        <section class="apresentacao">
            <h1>Oi!</h1>
            <h2>É bom ver você!</h2>
        </section>

       
        <section class="area-login">
            <div class="caixa-login">

                <h2>Log in</h2>
                <p>Novo usuário? <a href="#">Crie uma conta</a></p>

                <div class="login-magic">

                    <button class="rede-social-login-button">
                        <i class="fab fa-google"></i>
                        Continue com Google
                    </button>

                    <button class="rede-social-login-button">
                        <i class="fab fa-facebook-f"></i>
                        Continue com Facebook
                    </button>

                    <button class="rede-social-login-button">
                        <i class="fab fa-apple"></i>
                        Continue com Apple
                    </button>

                    <div class="rede-social-icons">
                        <a href="#"><i class="fab fa-steam"></i></a>
                        <a href="#"><i class="fab fa-discord"></i></a>
                        <a href="#"><i class="fab fa-twitch"></i></a>
                        <a href="#"><i class="fab fa-x-twitter"></i></a>
                    </div>

                    <div class="divider">ou</div>

                    <label for="email-magic"></label>
                    <input type="email" id="email-magic" placeholder="E-mail" class="input-field" required>

                    <button class="btn-primary">Obtenha link mágico</button>
                    <button class="btn-secondary">Faça login com senha</button>

                </div>

                <div class="login-password">

                    <button class="rede-social-login-button">
                        <i class="fab fa-google"></i>
                        Continue com Google
                    </button>

                    <button class="rede-social-login-button">
                        <i class="fab fa-facebook-f"></i>
                        Continue com Facebook
                    </button>

                    <button class="rede-social-login-button">
                        <i class="fab fa-apple"></i>
                        Continue com Apple
                    </button>

                    <div class="rede-social-icons">
                        <a href="#"><i class="fab fa-steam"></i></a>
                        <a href="#"><i class="fab fa-discord"></i></a>
                        <a href="#"><i class="fab fa-twitch"></i></a>
                        <a href="#"><i class="fab fa-x-twitter"></i></a>
                    </div>

                    <div class="divider">ou</div>

                    <label for="email-pass">E-mail</label>
                    <input type="email" id="email-pass" placeholder="E-mail" class="input-field">

                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Senha" class="input-field">

                    <span class="mostrar-senha">Mostrar senha</span>

                    <button class="btn-primary">Log in</button>

                    <a href="#" class="esqueceu-senha">Esqueceu sua senha?</a>

                    <button class="btn-secondary">Faça login com link mágico</button>

                </div>

            </div>
        </section>

    </main>

     <footer class="footer">

        <div class="idioma">
            <i class="fas fa-globe"></i>
            <span>Português Brasileiro</span>
        </div>

        <ul class="footer-links">
            <li><a href="#">Termos e Condições</a></li>
            <li><a href="#">Aviso de privacidade</a></li>
            <li><a href="#">Preferências de cookies</a></li>
            <li><a href="#">Suporte</a></li>
        </ul>

        <p>Copyright © 2026 Eneba. Todos os direitos reservados.</p>

    </footer>

    <script src="script.js"></script>

</body>
</html>
